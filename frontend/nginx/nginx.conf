server {
    listen 80;
    server_name your-domain.com;

    # React 앱 빌드 결과물이 있는 디렉토리 경로
    root /var/www/html;  # 예: /home/ubuntu/frontend/build

    index index.html;

    # React Router에서 클라이언트 측 경로 처리
    location / {
        try_files $uri /index.html;  # 클라이언트 측 라우팅을 위해 /index.html로 리디렉션
    }

    # HTTPS 설정 (필요한 경우)
    listen 443 ssl;
    ssl_certificate /path/to/certificate.crt;
    ssl_certificate_key /path/to/private.key;

    # 추가적인 보안 설정과 최적화
    include /etc/nginx/snippets/ssl-params.conf;
}
