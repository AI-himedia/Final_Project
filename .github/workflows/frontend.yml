# .github/workflows/frontend.yml

name: React Docker Deploy

on:
  push:
    branches: [dev]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"

jobs:
  Frontend_Deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Code Checkout
        uses: actions/checkout@v3

      - name: Docker Build & Push
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker 이미지 빌드 및 푸시
        run: |
          echo "${{ secrets.FRONTEND_ENV }}" > frontend/.env
          TAG_NAME="v1.0-${{ github.sha }}"
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/frontend:${TAG_NAME} ./frontend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/frontend:${TAG_NAME}

      - name: EC2에서 Docker 컨테이너 실행 (SSH 접속)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            # 기존 컨테이너가 있으면 중지 및 삭제
            docker stop frontend || true
            docker rm frontend || true
            # 최신 Docker 이미지 가져오기
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/frontend:${{ github.sha }}
            # Docker 컨테이너 실행 (80번 포트에서 React 앱 서빙)
            docker run -d --name frontend -p 80:80 ${{ secrets.DOCKERHUB_USERNAME }}/frontend:${{ github.sha }}

      # - name: Docker 이미지 자동 삭제 (기존 이미지 삭제)
      #   run: |
      #     # 이전 Docker 이미지를 삭제
      #     docker images --filter "dangling=true" -q | xargs -r docker rmi
      #     docker image prune -f
