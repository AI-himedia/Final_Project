# .github/workflows/frontend.yml

name: React Docker Deploy

on:
  push:
    branches: [cjh]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"

jobs:
  Frontend_Deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v3

      - name: Node Modules 캐시 처리
        uses: actions/cache@v3
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}

      - name: Node Modules 생성
        working-directory: frontend
        run: npm install

      - name: Docker Build & Push
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Build & Push
        run: |
          docker build \
            --build-arg REACT_APP_API_URL="${{ secrets.REACT_APP_API_URL }}" \
            --build-arg REACT_APP_FRONT_URL="${{ secrets.REACT_APP_FRONT_URL }}" \
            --build-arg REACT_APP_KAKAO_REST_API_KEY="${{ secrets.REACT_APP_KAKAO_REST_API_KEY }}" \
            --build-arg REACT_APP_KAKAO_CLIENT_SECRET="${{ secrets.REACT_APP_KAKAO_CLIENT_SECRET }}" \
            --build-arg REACT_APP_KAKAO_REDIRECT_URI="${{ secrets.REACT_APP_KAKAO_REDIRECT_URI }}" \
            --build-arg REACT_APP_TOSS_CLIENT_KEY="${{ secrets.REACT_APP_TOSS_CLIENT_KEY }}" \
            --build-arg REACT_APP_TOSS_CUSTOMER_KEY="${{ secrets.REACT_APP_TOSS_CUSTOMER_KEY }}" \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/frontend:${{ github.sha }} ./frontend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/frontend:${{ github.sha }}

      - name: EC2에서 Docker 컨테이너 실행
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            docker stop frontend || true
            docker rm frontend || true
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/frontend:${{ github.sha }}
            docker run -d --name frontend -p 80:80 \
              -e REACT_APP_API_URL="${{ secrets.REACT_APP_API_URL }}" \
              -e REACT_APP_FRONT_URL="${{ secrets.REACT_APP_FRONT_URL }}" \
              -e REACT_APP_KAKAO_REST_API_KEY="${{ secrets.REACT_APP_KAKAO_REST_API_KEY }}" \
              -e REACT_APP_KAKAO_CLIENT_SECRET="${{ secrets.REACT_APP_KAKAO_CLIENT_SECRET }}" \
              -e REACT_APP_KAKAO_REDIRECT_URI="${{ secrets.REACT_APP_KAKAO_REDIRECT_URI }}" \
              -e REACT_APP_TOSS_CLIENT_KEY="${{ secrets.REACT_APP_TOSS_CLIENT_KEY }}" \
              -e REACT_APP_TOSS_CUSTOMER_KEY="${{ secrets.REACT_APP_TOSS_CUSTOMER_KEY }}" \
              ${{ secrets.DOCKERHUB_USERNAME }}/frontend:${{ github.sha }}
