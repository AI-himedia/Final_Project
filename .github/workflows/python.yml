name: Python Docker Deploy

on:
  push:
    branches: [cjh] # 또는 사용하는 브랜치명
    paths:
      - "python/**"
      - ".github/workflows/python.yml"
      - "requirements.txt"
      - "python/Dockerfile"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Docker 로그인
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker 빌드 및 푸시
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/your-app-name:${{ github.sha }} -f ./python/Dockerfile ./python
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/your-app-name:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: SSH 접속 및 배포
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/your-app-name:${{ github.sha }}
            docker stop your-container-name || true
            docker rm your-container-name || true
            docker run -d --name your-container-name \
              --env-file /home/ubuntu/your-app/.env \
              -p 8080:8000 \
              ${{ secrets.DOCKERHUB_USERNAME }}/your-app-name:${{ github.sha }}
