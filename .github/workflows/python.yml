name: Python Docker Deploy

on:
  push:
    branches: [cjh]
    paths:
      - "python/**"
      - ".github/workflows/python.yml"
      - "Pipfile"
      - "Pipfile.lock"
      - "python/Dockerfile"

jobs:
  Python_Deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Code Checkout
        uses: actions/checkout@v3

      # GitHub Actions 러너에서 디스크 공간 확보
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          docker system prune -af
          df -h

      # Pipfile에서 requirements.txt 생성
      - name: Generate requirements.txt
        run: |
          pip install pipenv
          cd python
          pipenv requirements > requirements.txt

      - name: Docker 로그인
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker 이미지 빌드 및 푸시
        run: |
          echo "${{ secrets.PYTHON_ENV }}" > python/.env
          docker build \
            --build-arg GOOGLE_APPLICATION_CREDENTIALS_CONTENT="${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}" \
            --build-arg PYTHON_VERSION=3.11 \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/python:${{ github.sha }} \
            -f ./python/Dockerfile ./python
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/python:${{ github.sha }}

      - name: EC2에서 Docker 컨테이너 실행 (SSH 접속)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            docker system prune -af
            docker stop python-app || true
            docker rm python-app || true

            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/python:${{ github.sha }}

            docker run -d --name python-app --gpus all --runtime=nvidia --ipc=host --privileged --net=host \
              -v /home/ubuntu:/app \
              --env-file /home/ubuntu/python.env \
              ${{ secrets.DOCKERHUB_USERNAME }}/python:${{ github.sha }}
