# .github/workflows/ai-python.yml

name: Python Deploy

on:
  push:
    paths:
      - "python/**"
    branches: [dev]

jobs:
  deploy-python:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install & Deploy
        run: |
          cd ai-python
          pip install -r requirements.txt

      - name: Upload to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: "ai-python/**"
          target: "/home/ubuntu/ai"

      - name: Restart AI Service
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            sudo systemctl restart ai-service
