name: Python Docker Deploy

on:
  push:
    branches: [cjh]
    paths:
      - "python/**"
      - ".github/workflows/python.yml"
      - "Pipfile"
      - "Pipfile.lock"
      - "python/Dockerfile"

jobs:
  Python_Deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Code Checkout
        uses: actions/checkout@v3

      - name: Docker 로그인
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker 이미지 빌드 및 푸시
        run: |
          echo "${{ secrets.PYTHON_ENV }}" > python/.env
          docker build --build-arg PYTHON_VERSION=3.11 -t ${{ secrets.DOCKERHUB_USERNAME }}/python:${{ github.sha }} -f ./python/Dockerfile ./python
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/python:${{ github.sha }}

      # - name: Docker 이미지 취약점 스캔
      #   uses: aquasecurity/trivy-action@master
      #   with:
      #     image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/python:${{ github.sha }}
      #     format: table
      #     exit-code: 0
      #     severity: CRITICAL,HIGH
      #     scanners: vuln
      #     cache-clear: true

      - name: EC2에서 Docker 컨테이너 실행 (SSH 접속)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            docker stop python-app || true
            docker rm python-app || true
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/python:${{ github.sha }}
            docker run -d --gpus all --runtime=nvidia --ipc=host --privileged --net=host \
